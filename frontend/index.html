    <title>Projects MS</title>
    <script>
      (function() {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (prefersDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = 'oklch(0.2621 0.0039 253.13)';
        } else {
          document.documentElement.classList.add('light');
          document.documentElement.style.backgroundColor = 'oklch(0.9848 0.0016 253.12)';
        }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
