apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: quay.io/srntp/project-ms-server:v0.3.1
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: mariadb
            - name: DB_USER
              value: admin
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            - name: DB_NAME
              value: project_ms
            - name: DB_PORT
              value: "3306"
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: DB_CONNECTION_LIMIT
              value: "100"
            - name: SERVER_PORT
              value: "8000"
            - name: NODE_ENV
              value: production
            - name: IS_DOCKER
              value: "true"
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: server
spec:
  ports:
    - port: 8000
  selector:
    app: server
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: api
spec:
  path: /api
  to:
    kind: Service
    name: server
  tls:
    termination: edge