services:
  mariadb:
    image: mariadb:lts
    container_name: project_ms_dev_db
    restart: unless-stopped
    volumes:
      - ./dbinit/init.sql:/docker-entrypoint-initdb.d/0_init.sql
      - project_ms_db_dev_data:/var/lib/mysql
    ports:
      - 3307:3306
    environment:
      MYSQL_DATABASE: project_ms
      MYSQL_USER: admin
      MYSQL_PASSWORD: pwd@123
      MYSQL_ROOT_PASSWORD: pwd@123
      SERVICE_TAGS: development
      SERVICE_NAME: project_ms_dev_db
    networks:
      - internalnet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.0
    container_name: project_ms_redis_dev
    restart: unless-stopped
    ports:
      - 6379:6379
    networks:
      - internalnet

  pm_server_dev:
    container_name: pm_server_dev
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    image: pm_server_dev:dev
    ports:
      - 8081:8080
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_HOST: mariadb
      DB_PASSWORD: 'pwd@123'
      DB_USER: admin
      DB_NAME: project_ms
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_CONNECTION_LIMIT: 10
      NODE_ENV: development
      SERVICE_TAGS: development
      SERVICE_NAME: pm_server_devservice
    volumes:
      # Mount source code for hot reload
      - ./server:/app/server
      - /app/server/node_modules  # Prevent overwriting node_modules
    networks:
      - internalnet

  pm_frontend_dev:
    container_name: pm_frontend_dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev  # Use development Dockerfile
    image: pm_frontend_dev:dev
    ports:
      - 5000:5000
    depends_on:
      - pm_server_dev
    environment:
      VITE_APP_SERVER_URL: localhost:8081
      NODE_ENV: development
    volumes:
      # Mount source code for hot reload
      - ./frontend:/app/frontend
      - /app/frontend/node_modules  # Prevent overwriting node_modules
    networks:
      - internalnet

networks:
  internalnet:
    driver: bridge

volumes:
  project_ms_db_dev_data: