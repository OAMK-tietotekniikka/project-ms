name: "Build and Publish images"

on:
  push:
    branches: ["main"]
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all tags

      - name: Determine version tag
        id: determine_tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tagged release - use this version
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "Using tag version: $VERSION"
          else
            # Main branch - use latest version tag from repo
            LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
            if [[ -n "$LATEST_TAG" ]]; then
              VERSION=${LATEST_TAG#v}
              echo "Using latest repo version: $VERSION"
            else
              echo "No version tags found in repository"
              exit 1
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}  # Robot username with +
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      # 1. Generate tags and labels for the server image
      - name: Docker meta for server
        id: meta_server
        uses: docker/metadata-action@v5
        with:
          images: quay.io/${{ secrets.QUAY_ORG_NAME }}/project-ms-server  # Organization name without +
          tags: |
            type=raw,value=${{ steps.determine_tag.outputs.version }}

      # 2. Build and push the server image using the generated tags
      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta_server.outputs.tags }}
          labels: ${{ steps.meta_server.outputs.labels }}

      # 3. Run Trivy scan only when a new version tag is pushed
      - name: Run Trivy on server image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'quay.io/${{ secrets.QUAY_ORG_NAME }}/project-ms-server:${{ steps.determine_tag.outputs.version }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # 1. Generate tags and labels for the frontend image
      - name: Docker meta for frontend
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: quay.io/${{ secrets.QUAY_ORG_NAME }}/project-ms-frontend
          tags: |
            type=raw,value=${{ steps.determine_tag.outputs.version }}

      # 2. Build and push the frontend image using the generated tags
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

      # 3. Run Trivy scan only when a new version tag is pushed
      - name: Run Trivy on frontend image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'quay.io/${{ secrets.QUAY_ORG_NAME }}/project-ms-frontend:${{ steps.determine_tag.outputs.version }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
