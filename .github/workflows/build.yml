name: "Build and Publish images"
on:
  push:
    branches: ["main"]
    tags:
      - 'v*'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}
      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ github.ref == 'refs/heads/main' && format('quay.io/{0}/project-ms-server:latest', secrets.QUAY_USERNAME) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('quay.io/{0}/project-ms-server:{1}', secrets.QUAY_USERNAME, steps.version.outputs.version) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('quay.io/{0}/project-ms-server:latest', secrets.QUAY_USERNAME) || '' }}
      - name: Run Trivy on server image
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: ${{ github.ref == 'refs/heads/main' && format('quay.io/{0}/project-ms-server:latest', secrets.QUAY_USERNAME) || (startsWith(github.ref, 'refs/tags/v') && format('quay.io/{0}/project-ms-server:{1}', secrets.QUAY_USERNAME, steps.version.outputs.version)) }}
          format: 'table'
        continue-on-error: true
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |-
            ${{ github.ref == 'refs/heads/main' && format('quay.io/{0}/project-ms-frontend:latest', secrets.QUAY_USERNAME) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('quay.io/{0}/project-ms-frontend:{1}', secrets.QUAY_USERNAME, steps.version.outputs.version) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('quay.io/{0}/project-ms-frontend:latest', secrets.QUAY_USERNAME) || '' }}
      - name: Run Trivy on frontend image
        uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: ${{ github.ref == 'refs/heads/main' && format('quay.io/{0}/project-ms-frontend:latest', secrets.QUAY_USERNAME) || (startsWith(github.ref, 'refs/tags/v') && format('quay.io/{0}/project-ms-frontend:{1}', secrets.QUAY_USERNAME, steps.version.outputs.version)) }}
          format: 'table'
        continue-on-error: true