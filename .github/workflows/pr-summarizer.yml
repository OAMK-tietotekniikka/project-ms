name: Simple PR Summarizer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: changes
        run: |
          # Get the diff
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          
          # Check size and truncate if needed
          DIFF_SIZE=$(wc -c < pr_diff.txt)
          if [ $DIFF_SIZE -gt 30000 ]; then
            echo "Diff too large ($DIFF_SIZE chars), truncating..."
            head -c 30000 pr_diff.txt > temp_diff.txt
            mv temp_diff.txt pr_diff.txt
          fi
          
          # Output the diff
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          cat pr_diff.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate summary
        id: summary
        uses: actions/ai-inference@v1
        with:
          prompt-file: '.github/prompts/pr_summary.prompt.yml'
          input: |
            title: ${{ github.event.pull_request.title }}
            description: ${{ github.event.pull_request.body }}
            diff: ${{ steps.changes.outputs.diff }}
          model: 'openai/gpt-4.1'
          max-tokens: '2000'

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.summary.outputs.response }}
        with:
          script: |
            const summary = process.env.SUMMARY;
            const body = `## Quick Summary

            ${summary}

            *Generated by AI*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Quick Summary')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }